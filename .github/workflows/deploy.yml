name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Derive base path
        id: basepath
        env:
          REPO_FULL: ${{ github.repository }}
        run: |
          REPO_NAME="${REPO_FULL##*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPO_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.value }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io${{ steps.basepath.outputs.value }}
        run: pnpm build:no-search

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
